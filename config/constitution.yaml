# Agent Constitution — hard constraints evaluated before every tool call.
# This file is enforcement, not advisory. Violations halt execution.
constitution:
  version: "1.0"

  # Action types that always require explicit user approval (CLI prompt)
  approval_required:
    - action: file_delete
      description: "Any permanent file deletion"
    - action: email_send
      description: "Sending any email"
    - action: api_call_external
      description: "Any outbound call to an external API (non-localhost)"
    - action: shell_exec
      description: "Running a non-allowlisted terminal command"
    - action: git_push
      description: "Pushing code to a remote"
    - action: hub_stop_all
      description: "Stopping all Codehome apps"
    - action: app_stop
      description: "Stopping a running app"

  # Hard limits
  limits:
    max_tokens_per_workflow: 100000
    max_cost_per_day_usd: 5.00
    max_files_written_per_run: 50

  # Blocked operations — never execute regardless of context.
  # Matched as substrings against any shell command or file operation payload.
  blocked:
    - "rm -rf"
    - "DROP TABLE"
    - "mkfs"
    - "> /dev/"

  # Filesystem boundary — agents may only write inside these roots
  write_allowlist:
    - "/Users/tonyseneadza/Brain2"
    - "/Users/tonyseneadza/Codehome/AgenticOS/data"
    - "/Users/tonyseneadza/Codehome/"

  # Phase 14e — OSA proactive-notification policy. Balanced level: down/up
  # transitions announce; quiet hours downgrade to silent unless Tony is
  # active (HID idle probe, then last-chat recency, then fail-open active).
  notifications:
    quiet_hours_start: "22:00"     # local, HH:MM
    quiet_hours_end: "08:00"
    rate_limit_seconds: 300         # max 1 announced message per app per window
    activity_idle_minutes: 10       # HID idle below this => active
    chat_activity_minutes: 30       # fallback: OSA chat within this => active
    briefing_time: "08:30"         # daily spoken briefing (in-sidecar timer)
    briefing_enabled: true


