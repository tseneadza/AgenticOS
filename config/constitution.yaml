# Agent Constitution — hard constraints evaluated before every tool call.
# This file is enforcement, not advisory. Violations halt execution.
constitution:
  version: "1.0"

  # Action types that always require explicit user approval (CLI prompt)
  approval_required:
    - action: file_delete
      description: "Any permanent file deletion"
    - action: email_send
      description: "Sending any email"
    - action: api_call_external
      description: "Any outbound call to an external API (non-localhost)"
    - action: shell_exec
      description: "Running a non-allowlisted terminal command"
    - action: git_push
      description: "Pushing code to a remote"
    - action: hub_stop_all
      description: "Stopping all Codehome apps"
    - action: app_stop
      description: "Stopping a running app"
    - action: model_pull
      description: "Downloading a new local model (multi-GB)"
    - action: macos.run_command
      description: "Running a non-allowlisted terminal command on this Mac"
    - action: fs.write_file
      description: "Writing a file outside the OSA scratch root"
    - action: fs.append
      description: "Appending to a file outside the OSA scratch root"
    - action: fs.move
      description: "Moving/renaming a file or directory (irreversible)"
    - action: fs.delete
      description: "Deleting a file or empty directory (irreversible)"
    - action: messages.send_message
      description: "Sending an iMessage/SMS from this Mac (irreversible)"

  # Hard limits
  limits:
    max_tokens_per_workflow: 100000
    max_cost_per_day_usd: 5.00
    max_files_written_per_run: 50

  # Blocked operations — never execute regardless of context.
  # Matched as substrings against any shell command or file operation payload.
  blocked:
    - "rm -rf"
    - "DROP TABLE"
    - "mkfs"
    - "> /dev/"

  # Filesystem boundary — agents may only write inside these roots
  write_allowlist:
    - "/Users/tonyseneadza/Brain2"
    - "/Users/tonyseneadza/Codehome/AgenticOS/data"
    - "/Users/tonyseneadza/Codehome/"

  # Phase 14e — OSA proactive-notification policy. Balanced level: down/up
  # transitions announce; quiet hours downgrade to silent unless Tony is
  # active (HID idle probe, then last-chat recency, then fail-open active).
  notifications:
    quiet_hours_start: "22:00"     # local, HH:MM
    quiet_hours_end: "08:00"
    rate_limit_seconds: 300         # max 1 announced message per app per window
    activity_idle_minutes: 10       # HID idle below this => active
    chat_activity_minutes: 30       # fallback: OSA chat within this => active
    briefing_time: "08:30"         # daily spoken briefing (in-sidecar timer)
    briefing_enabled: true

  # Phase 14d — OSA voice pipeline (openWakeWord -> faster-whisper -> Piper).
  # enabled stays FALSE until Tony verifies mic/speaker on-device and installs
  # the optional extras (pip install -r requirements-voice.txt). push_to_talk
  # is the default interaction (design §9 Q3 unresolved — no always-listening
  # until Tony opts in). piper_voice is TBD pending a voice audition.
  voice:
    enabled: true                   # voice-OUT ON (2026-07-08)
    wake_word: "osa"
    stt_model: "small"             # faster-whisper model size
    # Voice-OUT (2026-07-08): Piper TTS speaks OSA's replies + announcements.
    piper_voice: "en_GB-alan-medium"   # bare name under voice_dir, or .onnx path
    voice_dir: "~/.agentic-os/voices"  # where Piper .onnx models live
    speak_replies: true             # speak chat replies + announced proactive msgs
    length_scale: 0.6               # speech cadence: 1.0=trained pace, lower=faster (2026-07-08)
    end_silence_ms: 500             # end-of-speech: ms of silence that ends an utterance (snappier, 2026-07-08)
    min_rms: 0.02                   # energy gate: frames must be this loud to count as speech (TV rejection, calibrated live 2026-07-08 for the MacBook mic — which input_device now pins)
    followup_window_s: 8            # conversation mode: seconds after a reply when no wake word is needed (0 = off)
    input_device: "MacBook"         # PIN capture to the built-in mic (2026-07-10: headphone inline mic became default input and delivered fragments/noise — headphones are output-only now)
    push_to_talk_only: true         # voice-IN only; wake word deferred (§9 Q3)
    mute: false

  # Phase 15a — OSA System MCP safety policy (design: PHASE15_OSA_SYSTEM_MCP.md
  # §4). strict = only allowlisted terminal commands auto-run; everything else
  # halts to human approval. Denylist patterns ALWAYS deny (both modes). This
  # list is code review, not a runtime guess — edits here are versioned.
  # Flip mode to "effect" only after 15e (read/mutate/irreversible classifier).
  system_mcp:
    mode: strict                    # strict | effect
    terminal:
      allowlist:                    # auto-run (prefix or exact match)
        - date
        - uptime
        - whoami
        - pwd
        - ls
        - df
        - "git status"
        - "git log"
      denylist_patterns:            # ALWAYS deny, regardless of mode/approval
        - "rm -rf"
        - "sudo"
        - "dd "
        - "mkfs"
        - "curl | sh"
        - "| sh"
        - "> /dev/"
        - ":(){"
        - "chmod 777 /"
    # Phase 15b — filesystem capability scoping (design §4.2 / §5.2).
    # Paths are symlink-resolved before the root check; outside these roots
    # is a hard deny (approval cannot override). Writes inside scratch_root
    # auto-run even in strict mode.
    fs:
      allowed_roots:
        - ~/Codehome
        - ~/Brain2
      scratch_root: ~/Codehome/AgenticOS/data/osa_scratch
    # Phase 15c — iMessage read (chat.db). db_path is CONFIG (never a caller
    # arg), so an MCP client can't repoint the reader. Reading needs Full Disk
    # Access for the running process.
    messages:
      db_path: ~/Library/Messages/chat.db
      max_limit: 200

