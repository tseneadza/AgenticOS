# Agentic OS — global settings
settings:
  vault_path: "/Users/tonyseneadza/Brain2"
  # hub_url: "http://localhost:8085"  # Phase 9d: RETIRED — Hub decommissioned 2026-06-26
  #   All app management now handled natively by core/app_registry.py +
  #   core/process_manager.py. hub_mcp.py still exists as an MCP surface
  #   but its internals call native code, not Hub HTTP.

  # Phase 9d: disable Hub auto-start on sidecar boot. The sidecar no longer
  # needs Hub running; this flag prevents _ensure_hub_running from spawning it.
  hub_autostart: false
  data_dir: "data"

  # Filesystem tool backend (TR-03): "mcp" = real MCP stdio client to
  # @modelcontextprotocol/server-filesystem; "direct" = Phase 1 direct
  # file ops (fallback for npx-hostile environments like launchd).
  filesystem_backend: "mcp"

  # AgenticOS FastAPI sidecar (Phase 2) — registered in
  # ~/Codehome/hub/docs/PORT_ASSIGNMENTS.md (TR-10).
  sidecar_port: 5130

  # Workflow step aliases → concrete model ids (resolved by core/llm.py).
  models:
    default: "claude-sonnet-4-6"
    fast: "claude-haiku-4-5-20251001"
    local: "qwen2.5:7b-instruct"

  # If ANTHROPIC_API_KEY is not set, briefing falls back to a
  # deterministic template (useful for dry runs / testing).
  allow_template_fallback: true

  # Morning-briefing "recently created" window. "Recent" = documents created
  # since the last time the briefing was issued (the watermark is the most
  # recent COMPLETED run of recent_watermark_workflow; see core/memory.last_run_at).
  briefing:
    # Cold start only: when there is no prior completed briefing run, look back
    # this many hours instead.
    recent_fallback_hours: 24
    # Which workflow's last run defines "since last request". Default scopes the
    # window to the briefing itself; set to another workflow to share a marker.
    recent_watermark_workflow: "morning-briefing"
    # Cap the number of new docs surfaced in one brief.
    recent_max_items: 30
    # Top-level vault folders (and any dotfolders) excluded from the scan.
    recent_exclude_folders:
      - "06 - Archive"
      - "Templates"
      - ".obsidian"
      - ".git"
      - ".trash"

  # USD per million tokens — verify against https://www.anthropic.com/pricing
  # Unknown models fall back to the most expensive entry here (conservative).
  # Local (Ollama) models are priced 0 so they never consume the daily cap.
  pricing:
    claude-sonnet-4-6: {input: 3.00, output: 15.00}
    claude-haiku-4-5-20251001: {input: 1.00, output: 5.00}
    "qwen2.5:7b-instruct": {input: 0, output: 0}
    "llama3.1:8b": {input: 0, output: 0}
    "llama3.2:latest": {input: 0, output: 0}

  # Phase 10 / NF-3 — governing agent + unified LLM layer (FR-52/53).
  agent:
    # Active model on sidecar startup. Decision (2026-06-14): local-default,
    # escalate to cloud one toggle away. Falls back to cloud if Ollama is down.
    default_model: "qwen2.5:7b-instruct"
    # Local Ollama service. Optional: if unreachable, only cloud models offered.
    ollama_base_url: "http://localhost:11434"
    # Cloud (Anthropic) endpoint. Pinned so the OS's cloud path is NOT hijacked
    # by an ambient ANTHROPIC_BASE_URL/ANTHROPIC_AUTH_TOKEN the shell exports to
    # route other tools (e.g. Claude Code) through a local proxy/Ollama. Only
    # change this if you intentionally front Anthropic with a gateway.
    anthropic_base_url: "https://api.anthropic.com"
    # Model registry (FR-53). cost_per_mtok 0 ⇒ does not count against the cap.
    models:
      - id: "claude-sonnet-4-6"
        provider: "anthropic"
        label: "Claude Sonnet 4.6 (cloud)"
        context_window: 200000
        supports_tools: true
        cost_per_mtok: {input: 3.00, output: 15.00}
      - id: "claude-haiku-4-5-20251001"
        provider: "anthropic"
        label: "Claude Haiku 4.5 (cloud)"
        context_window: 200000
        supports_tools: true
        cost_per_mtok: {input: 1.00, output: 5.00}
      - id: "qwen2.5:7b-instruct"
        provider: "ollama"
        label: "Qwen2.5 7B Instruct (local)"
        context_window: 32768
        supports_tools: true
        cost_per_mtok: {input: 0, output: 0}
      - id: "llama3.1:8b"
        provider: "ollama"
        label: "Llama 3.1 8B (local)"
        context_window: 131072
        supports_tools: true
        cost_per_mtok: {input: 0, output: 0}
      # OSA to-do #4 (2026-07-07): Tony's installed llama3.2 promoted from
      # discovered to curated — first-class switch target with a clean label.
      - id: "llama3.2:latest"
        provider: "ollama"
        label: "Llama 3.2 3B (local)"
        context_window: 131072
        supports_tools: true
        cost_per_mtok: {input: 0, output: 0}

  # ─────────────────────────────────────────────────────────────────────────
  # Adding more models (zero code). Append entries to agent.models above with
  # the right `provider`. Adapters live in core/llm.py; register_provider() can
  # add brand-new ones from a plugin. Set the referenced API-key env vars in
  # your shell / launchd before selecting the model.
  #
  # One adapter — provider: openai_compatible — covers every OpenAI-protocol
  # endpoint; only base_url + api_key_env change. Examples:
  #
  #   - id: "gpt-4o"
  #     provider: "openai_compatible"
  #     label: "GPT-4o (OpenAI)"
  #     api_key_env: "OPENAI_API_KEY"
  #     # base_url omitted ⇒ api.openai.com default
  #     context_window: 128000
  #     cost_per_mtok: {input: 2.50, output: 10.00}
  #
  #   - id: "llama-3.3-70b-versatile"
  #     provider: "openai_compatible"
  #     label: "Llama 3.3 70B (Groq)"
  #     base_url: "https://api.groq.com/openai/v1"
  #     api_key_env: "GROQ_API_KEY"
  #     cost_per_mtok: {input: 0.59, output: 0.79}
  #
  #   - id: "deepseek/deepseek-chat"
  #     provider: "openai_compatible"
  #     label: "DeepSeek V3 (OpenRouter)"
  #     base_url: "https://openrouter.ai/api/v1"
  #     api_key_env: "OPENROUTER_API_KEY"
  #
  #   - id: "local-model"                 # self-hosted vLLM / LM Studio
  #     provider: "openai_compatible"
  #     label: "Local OpenAI-compatible server"
  #     base_url: "http://localhost:1234/v1"
  #     # no api_key_env ⇒ a placeholder key is sent; priced 0 below
  #     cost_per_mtok: {input: 0, output: 0}
  #
  #   - id: "gemini-2.5-flash"
  #     provider: "google"
  #     label: "Gemini 2.5 Flash"
  #     api_key_env: "GOOGLE_API_KEY"
  #     cost_per_mtok: {input: 0.30, output: 2.50}
  #
  # `extra: {temperature: 0.2, top_p: 0.9}` on any entry passes straight to the
  # underlying LangChain constructor.
  # ─────────────────────────────────────────────────────────────────────────
